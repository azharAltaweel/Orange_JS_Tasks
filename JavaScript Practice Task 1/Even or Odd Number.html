<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even or Odd Number</title>
</head>
<body>
    <script>

    let x=Number(prompt("Enter a number:"));
    if(x%2===0)
        alert(`The number ${x} is Even`);
    else
        alert(`The number ${x} is Odd`);

    </script>
</body>
</html>
