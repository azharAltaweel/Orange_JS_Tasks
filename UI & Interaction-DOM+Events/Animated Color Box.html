<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5</title>
</head>
<style>
    .box{
  width: 200px;
  height: 200px;
  background-color: rgb(94, 12, 12);
  transition: background-color 1s;
    }
    .change-color{
        background-color: yellow;
    }

</style>
<body>
    <div class="box"></div>

    <script>
        let box=document.getElementsByClassName("box")[0];
        setInterval(()=>{
            box.classList.toggle("change-color");
        },1000);
    </script>
</body>
</html>
