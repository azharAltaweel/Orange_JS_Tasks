<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
</head>
<body>
    <h1>Basic Info Form With Basic Validation</h1>
    <form id="form">
        <label>First Name:  </label>
        <input type="text" id="fname" placeholder="Enter your first name"  ><br>
        <small id="fname_error" style="color:red;"></small>
        <br><br>
        <label>Last Name:  </label>
        <input type="text" id="lname" placeholder="Enter your last name" ><br>
        <small id="lname_error" style="color:red;"></small>
        <br><br>

        <label>Email:  </label>
        <input type="email" id="email" placeholder="Email" ><br>
        <small id="email_error" style="color:red;"></small>
        <br><br>
        <label>Mobile Number:  </label>
        <input type="number" id="mobile" placeholder="Enter your Mobile Number" ><br>
        <small id="mobile_error" style="color:red;"></small>
        <br><br>
        <button type="submit" id="btn">Submit</button>
<hr>
<h5>Submitted Data: </h5>
<div id="output"></div>
<script>
    let form=document.getElementById("form");

    form.addEventListener("submit",function(e){
e.preventDefault();
let fname=document.getElementById("fname").value.trim();
let lname=document.getElementById("lname").value.trim();
let email=document.getElementById("email").value.trim();
let mobile=document.getElementById("mobile").value.trim();

    let fname_error = document.getElementById("fname_error");
    let lname_error = document.getElementById("lname_error");
    let email_error = document.getElementById("email_error");
    let mobile_error = document.getElementById("mobile_error");

    let isValid = true;

//عشان كل ما اعمل submit يرجع يشييك من جديد ويكتب الاايرور الجديدة ما يضل حاطط نفس الايرور حتى لو غيرنا الانبوت
    fname_error.textContent = "";
    lname_error.textContent = "";
    email_error.textContent = "";
    mobile_error.textContent = "";



    let nameRegex = /^[A-Za-z]+$/;
    if(fname===""){
        fname_error.textContent=" first name is empty ";
        isValid=false;
    }else if(!nameRegex .test(fname)){
        fname_error.textContent=" first name must contains letters only ";
        isValid=false;       
    }
    if(lname===""){
        lname_error.textContent=" last name is empty ";
        isValid=false;
    }else if(!nameRegex .test(lname)){
        lname_error.textContent=" last name must contains letters only ";
        isValid=false;       
    }
    let emailRegex=/^[^\s@]+@[^/s@]+\.[^\s@]+$/;
    if (email === "") {
        email_error.textContent = "Email is empty";
        isValid = false;
    } else if(!emailRegex.test(email)){
        email_error.textContent = "Email is wrong";
       isValid=false;
    }
let mobileRegex = /^[0-9]{10}$/;
if (mobile === "") {
        mobile_error.textContent = "Mobile number is required";
        isValid = false;
    } else if (!mobileRegex.test(mobile)) {
        mobile_error.textContent = "Mobile must be exactly 10 digits";
        isValid = false;
    }


    if(isValid){
let output=document.getElementById("output");
        output.innerHTML = "";//كل Submit يضيف بيانات جديدة بدون حذف القديمة
 
let data1 = document.createElement("p");
    data1.textContent = "First Name:  " + fname;
let data2 = document.createElement("p");
    data2.textContent = "Last Name:  " + lname;
let data3 = document.createElement("p");
    data3.textContent = "Email:  " + email;
let data4=document.createElement("p");
        data4.textContent = "Mobile: " + mobile;

output.appendChild(data1);
output.appendChild(data2);
output.appendChild(data3);
output.appendChild(data4);

    }
});

</script>
    </form>
</body>
</html>
